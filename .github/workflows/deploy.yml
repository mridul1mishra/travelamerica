name: Deploy to Vercel (master only)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "ERROR: VERCEL_DEPLOY_HOOK secret is not set." >&2
            echo "Add it under Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi
          curl -fsS -X POST "$DEPLOY_HOOK"
